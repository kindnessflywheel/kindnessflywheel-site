# phaedrus-managed Decap CMS config. Regenerated by `make install-site-assets`.
# Placeholders are substituted by scripts/install-site-assets.sh.
backend:
  name: github
  repo: kindnessflywheel/kindnessflywheel-site
  branch: main
  base_url: https://kindnessflywheel-oauth-j5ezp3svyq-uc.a.run.app
  auth_endpoint: auth
  # Decap will land authoring as commits on a phaedrus PR branch for review.
  open_authoring: false
  squash_merges: true

publish_mode: editorial_workflow
media_folder: assets/images/posts
public_folder: /assets/images/posts
site_url: https://kindnessflywheel.org
display_url: https://kindnessflywheel.org

collections:
  - name: posts
    label: Posts
    folder: _posts
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    extension: md
    format: yaml-frontmatter
    fields:
      - { name: title,       label: Title,       widget: string }
      - { name: date,        label: Date,        widget: datetime }
      - { name: description, label: Description, widget: text, hint: 'One-line summary used by llms.txt and SEO.' }
      - { name: authors,     label: Authors,     widget: list, hint: 'Author ids from _data/authors.yml or _authors/, comma-separated.' }
      - { name: lens, label: Lenses, widget: select, options: [ "Strategy", "People", "Technology", "Practice", "Meta" ] }
      - { name: tags,        label: Tags,        widget: list, required: false, hint: 'Free-form. New tags get extra scrutiny at PR review.' }
      - { name: body,        label: Body,        widget: markdown }

  - name: authors
    label: Authors
    folder: _authors
    create: true
    extension: md
    format: yaml-frontmatter
    identifier_field: name
    fields:
      - { name: name,   label: Name,   widget: string }
      - { name: bio,    label: Bio,    widget: text, required: false }
      - { name: url,    label: URL,    widget: string, required: false }
      - { name: avatar, label: Avatar, widget: image,  required: false }
