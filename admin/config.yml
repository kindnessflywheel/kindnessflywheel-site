# phaedrus-managed Decap CMS config. Regenerated by `make install-site-assets`.
# Placeholders are substituted by scripts/install-site-assets.sh.
backend:
  name: github
  repo: kindnessflywheel/kindnessflywheel-site
  branch: main
  base_url: https://kindnessflywheel-oauth-j5ezp3svyq-uc.a.run.app
  auth_endpoint: auth
  # Decap will land authoring as commits on a phaedrus PR branch for review.
  open_authoring: false
  squash_merges: true

publish_mode: editorial_workflow
media_folder: assets/images/posts
public_folder: /assets/images/posts
site_url: https://kindnessflywheel.org
display_url: https://kindnessflywheel.org

collections:
  - name: posts
    label: Posts
    folder: _posts
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    extension: md
    format: yaml-frontmatter
    fields:
# phaedrus canonical posts fields — universal Jekyll core + jekyll-seo-tag convention.
# Injected at the __POSTS_FIELDS__ marker in admin/config.yml by install-site-assets.sh.
# Per-site override: drop a complete replacement block at sites/<site>.posts-fields.yml.
      - { name: title,   label: Title,   widget: string }
      - { name: date,    label: Date,    widget: datetime }
      - name: author
        label: Author
        widget: relation
        collection: authors
        value_field: title
        search_fields: ['title']
        display_fields: ['title']
        required: true
        hint: 'Pick an author. New authors: create them in the Authors collection first (and add a matching _data/authors.yml entry).'
      - { name: excerpt, label: Excerpt, widget: text, hint: 'Teaser AND SEO meta description (seo-tag falls back description→excerpt→site.description).' }
      - name: tags
        label: Tags
        widget: relation
        collection: tag_vocabulary
        file: tags
        value_field: 'tags.*.name'
        search_fields: ['tags.*.name']
        display_fields: ['tags.*.name']
        multiple: true
        min: 1
        required: true
        hint: 'Pick from the curated vocabulary. Need a new tag? Add it to _data/tags.yml in this PR.'
      - { name: body,    label: Body,    widget: markdown }

  # Author landing pages (_authors/<slug>.md). The post "Author" relation above
  # selects from these by title. NOTE: a post's byline/SEO resolves the author
  # name against _data/authors.yml (keyed by that title) — keep the two in sync.
  - name: authors
    label: Authors
    folder: _authors
    create: true
    extension: md
    format: yaml-frontmatter
    identifier_field: title
    fields:
# phaedrus author-page fields — the _authors/<slug>.md landing pages.
# `layout` + `author_profile` come from _config `defaults` for type: authors; pinned
# here as hidden so CMS-created/edited entries keep them. `permalink` is derived by
# the collection's permalink setting (/authors/:path/), so it isn't edited here.
# Per-site override: drop a complete replacement block at sites/<site>.authors-fields.yml.
      - { name: title,          label: Name,           widget: string }
      - { name: layout,         label: Layout,         widget: hidden, default: single }
      - { name: author_profile, label: Author profile, widget: hidden, default: true }
      - { name: body,           label: Bio,            widget: markdown }

  # Curated tag vocabulary — the set offered to the posts "Tags" relation widget.
  # Single source of truth for known tags; also read by the MCP server and the
  # check-new-tags PR check. Add a new tag by editing _data/tags.yml in a PR.
  - name: tag_vocabulary
    label: Tag vocabulary
    editor:
      preview: false
    files:
      - name: tags
        label: Tags
        file: _data/tags.yml
        fields:
          - name: tags
            label: Tags
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
