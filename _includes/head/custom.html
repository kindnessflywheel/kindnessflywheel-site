<meta name="referrer" content="strict-origin-when-cross-origin">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap">

<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/brand/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/brand/favicon-32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/brand/favicon-16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/brand/apple-touch-icon.png' | relative_url }}">

<!-- Organization schema (all pages) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@id": "{{ site.url }}{{ site.baseurl }}/#org",
  "@type": "Organization",
  "name": "The Kindness Flywheel",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "description": {{ site.description | strip_newlines | strip | jsonify }}
}
</script>

{% if page.date %}
{% assign author_name = page.author | default: page.authors[0] %}
{% assign author = site.data.authors[author_name] %}
{% if author %}
<!-- Author schema (resolved from post frontmatter + authors.yml) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@id": "{{ site.url }}{{ site.baseurl }}/#author-{{ author_name | slugify }}",
  "@type": "Person",
  "name": {{ author.name | jsonify }},
  {% if author.bio %}"description": {{ author.bio | jsonify }},{% endif %}
  {% if author.location %}"address": { "@type": "PostalAddress", "addressLocality": {{ author.location | jsonify }} },{% endif %}
  "sameAs": [
    {% for link in author.links %}{% if link.url %}"{{ link.url }}"{% unless forloop.last %},{% endunless %}{% endif %}{% endfor %}
  ]
}
</script>

<!-- Article schema (resolved per post) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ page.title | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "author": {
    "@id": "{{ site.url }}{{ site.baseurl }}/#author-{{ author_name | slugify }}"
  },
  "publisher": {
    "@id": "{{ site.url }}{{ site.baseurl }}/#org"
  },
  "mainEntityOfPage": "{{ site.url }}{{ site.baseurl }}{{ page.url }}",
  "license": "https://creativecommons.org/licenses/by/4.0/",
  {% if page.excerpt %}"description": {{ page.excerpt | strip_html | strip_newlines | truncate: 200 | jsonify }},{% endif %}
  {% if page.tags %}"keywords": {{ page.tags | jsonify }}{% endif %}
}
</script>
{% endif %}
{% endif %}
