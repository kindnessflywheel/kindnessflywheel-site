<div class="page__footer">
  <footer>
    <div class="page__footer-follow">
      <ul class="social-icons">
        {% if site.feed.path or null %}
          <li><a href="{{ site.feed.path | default: '/feed.xml' | relative_url }}"><i class="fas fa-fw fa-rss-square" aria-hidden="true"></i> Feed</a></li>
        {% endif %}
        {% for link in site.footer.links %}
          <li><a href="{{ link.url }}" rel="nofollow noopener noreferrer"><i class="{{ link.icon }}" aria-hidden="true"></i> {{ link.label }}</a></li>
        {% endfor %}
      </ul>
    </div>
    <div class="page__footer-copyright">
      <p>Built with ♥️. All content licensed under <a href="https://creativecommons.org/licenses/by/4.0/" rel="nofollow">CC-BY 4.0</a>. Powered by <a href="https://jekyllrb.com" rel="nofollow">Jekyll</a> &amp; <a href="https://mademistakes.com/work/minimal-mistakes-jekyll-theme/" rel="nofollow">Minimal Mistakes</a>.</p>
    </div>
  </footer>
</div>
