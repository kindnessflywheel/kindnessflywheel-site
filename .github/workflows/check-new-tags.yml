# phaedrus — flag PRs whose posts use tags outside the curated vocabulary.
# Non-blocking: this never fails the PR. It just posts a sticky comment when a
# post uses a tag that isn't in _data/tags.yml, so a reviewer can decide whether
# it's a synonym/typo or a deliberate vocabulary expansion (add it to _data/tags.yml).
name: phaedrus / check new tags

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '_posts/**'
      - '_data/tags.yml'
      - 'scripts/check_new_tags.py'
      - '.github/workflows/check-new-tags.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: phaedrus-check-new-tags-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Detect new tags
        id: detect
        env:
          REPORT_FILE: .phaedrus-new-tags.md
        run: |
          python scripts/check_new_tags.py
          if [[ -s .phaedrus-new-tags.md ]]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR (new tags found)
        if: steps.detect.outputs.has_new == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: phaedrus-new-tags
          path: .phaedrus-new-tags.md

      - name: Clear stale comment (no new tags)
        if: steps.detect.outputs.has_new != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: phaedrus-new-tags
          delete: true
