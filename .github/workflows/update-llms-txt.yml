# phaedrus — regenerate the autogenerated block of llms.txt whenever the
# content of _posts/, _authors/, or _data/authors.yml changes on the default
# branch. Installed by `make install-site-assets`.
name: Update llms.txt

on:
  push:
    branches: [main, master]
    paths:
      - '_posts/**'
      - '_authors/**'
      - '_data/authors.yml'
      - '_config.yml'
      - 'scripts/gen_llms_txt.py'
      - '.github/workflows/update-llms-txt.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: llms-txt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Regenerate llms.txt autogen block
        run: python scripts/gen_llms_txt.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain llms.txt)" ]]; then
            git config user.name  'phaedrus-bot'
            git config user.email 'phaedrus-bot@users.noreply.github.com'
            git add llms.txt
            git commit -m 'chore(llms.txt): refresh autogen block'
            git push
          else
            echo 'llms.txt already current.'
          fi
