# Site settings
title: "Kindness Flywheel"
subtitle: "Human-centered leadership in the age of AI"
description: >-
  Open-source ideas about what makes businesses defensible when AI
  commoditizes everything else. Stories from the field. Built with care.
url: "https://kindnessflywheel.org"
baseurl: ""
logo: "/assets/images/brand/lockup-horizontal.svg"
og_image: "/assets/images/brand/og-image.png"

# Sass — let main.scss import partials from assets/css/ (where the brand
# archive's design-tokens partial lives) in addition to the default _sass/.
sass:
  load_paths:
    - assets/css

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

# Build
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Reading
words_per_minute: 200

# Defer the theme bundle until Fraunces has loaded. Without this, MM's
# greedy-nav measures menu-item widths in the Georgia fallback (narrower
# than Fraunces), caches them, and then never recovers when the real font
# swaps in — leaving menu items clipped on narrow viewports instead of
# collapsing into the hamburger. The loader script below waits for
# document.fonts.ready before injecting main.min.js.
footer_scripts:
  - /assets/js/load-main.js

# Collections
collections:
  authors:
    output: true
    permalink: /authors/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: authors
    values:
      layout: single
      author_profile: true

# Pagination
paginate: 6
paginate_path: /page:num/

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kindnessflywheel/kindnessflywheel-site"

# Include
include:
  - _pages

# Search
search: true
search_full_content: true
search_provider: lunr

